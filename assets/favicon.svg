<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="favPine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a872"/>
      <stop offset="50%" stop-color="#c89554"/>
      <stop offset="100%" stop-color="#a87a3e"/>
    </linearGradient>
    <linearGradient id="favBrook" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f4d72"/>
      <stop offset="50%" stop-color="#33a5c7"/>
      <stop offset="100%" stop-color="#8cd9d9"/>
    </linearGradient>
  </defs>
  <!-- Dark stained wood frame — fills the entire favicon for boldness -->
  <rect x="0" y="0" width="48" height="48" rx="6" fill="#1c130a"/>
  <!-- Pine plank inset -->
  <rect x="5" y="9" width="38" height="30" rx="2" fill="url(#favPine)"/>
  <!-- Brook ripples — thicker strokes than nav so they survive at 16px -->
  <g fill="none" stroke="url(#favBrook)" stroke-width="2.6" stroke-linecap="round">
    <path d="M 9 17 Q 16 14 24 17 Q 32 20 39 17"/>
    <path d="M 9 24 Q 16 20 24 24 Q 32 28 39 24"/>
    <path d="M 9 31 Q 16 28 24 31 Q 32 34 39 31"/>
  </g>
</svg>
