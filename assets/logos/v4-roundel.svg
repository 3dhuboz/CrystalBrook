<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Crystal Brook Wall Mounts — Roundel Mark">
  <!-- V4 — ROUNDEL MARK
       Optimised for favicon, app icon, Instagram avatar.
       Bass centered, "CRYSTAL BROOK" curving along top arc,
       "WALL MOUNTS" curving along bottom arc.
       Reads at 32px and scales gracefully to 1024px. -->

  <defs>
    <style>
      .bg     { fill:#0F0B07; }
      .gold   { fill:#C8A35E; }
      .gold-stroke   { fill:none; stroke:#C8A35E; stroke-width:6; }
      .gold-stroke-2 { fill:none; stroke:#C8A35E; stroke-width:1.5; }
      .gold-thin     { fill:none; stroke:#C8A35E; stroke-width:1; }
      .ink-stroke    { fill:none; stroke:#0F0B07; stroke-width:1.4; }
      .serif  { font-family: 'Cormorant Garamond', 'Times New Roman', serif; fill:#C8A35E; }
    </style>
    <!-- Top arc — drawn left→right going over the top so text reads upright -->
    <path id="topArc" d="M 60 200 A 140 140 0 0 1 340 200" fill="none"/>
    <!-- Bottom arc — drawn right→left going under the bottom so text reads upright -->
    <path id="bottomArc" d="M 340 200 A 140 140 0 0 1 60 200" fill="none"/>
  </defs>

  <rect class="bg" width="400" height="400"/>

  <!-- Outer ring (thick) -->
  <circle cx="200" cy="200" r="180" class="gold-stroke"/>
  <!-- Inner ring (thin) — defines the type lane -->
  <circle cx="200" cy="200" r="148" class="gold-stroke-2"/>
  <!-- Innermost ring — defines the icon lane -->
  <circle cx="200" cy="200" r="118" class="gold-thin" opacity="0.5"/>

  <!-- Top curved text -->
  <text class="serif" font-size="22" font-weight="600" letter-spacing="6">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">CRYSTAL BROOK</textPath>
  </text>

  <!-- Bottom curved text -->
  <text class="serif" font-size="16" font-weight="500" letter-spacing="9">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">WALL MOUNTS</textPath>
  </text>

  <!-- Side dot separators (9 and 3 o'clock) on the inner ring -->
  <circle cx="52"  cy="200" r="4" class="gold"/>
  <circle cx="348" cy="200" r="4" class="gold"/>

  <!-- ============ BASS ICON — centered ============ -->
  <g transform="translate(108,160)">
    <!-- Tail -->
    <path class="gold" d="M 150 50 L 188 22 L 174 50 L 188 78 Z"/>
    <!-- Spiny dorsal -->
    <path class="gold" d="M 56 28 L 64 8 L 72 24 L 82 12 L 92 24 L 102 14 L 112 24 L 122 16 L 132 28 Z"/>
    <!-- Pectoral fin -->
    <path class="gold" d="M 38 56 L 26 80 L 52 66 Z"/>
    <!-- Pelvic fin -->
    <path class="gold" d="M 64 72 L 74 92 L 86 74 Z"/>
    <!-- Anal fin -->
    <path class="gold" d="M 112 76 L 122 94 L 132 76 Z"/>
    <!-- Body -->
    <path class="gold" d="
      M 16 50
      C 16 28, 56 22, 96 26
      C 132 30, 156 38, 156 50
      C 156 62, 132 70, 96 74
      C 56 78, 16 72, 16 50
      Z"/>
    <!-- Mouth gape -->
    <path d="M 16 50 L 0 42 L 0 58 Z" fill="#0F0B07"/>
    <!-- Gill arc -->
    <path class="ink-stroke" d="M 38 32 Q 46 50 38 68"/>
    <!-- Eye -->
    <circle cx="32" cy="42" r="3" fill="#0F0B07"/>
    <circle cx="33" cy="41" r="0.9" class="gold"/>
  </g>

  <!-- EST 2024 micro-mark below bass -->
  <text class="serif" x="200" y="280" font-size="10" letter-spacing="3" text-anchor="middle">EST · 2024</text>
</svg>
