<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" role="img" aria-label="Crystal Brook Wall Mounts — Modern Minimalist variant">
  <!-- V3 — MODERN MINIMALIST
       Inspired by Mampara, Patagonia.
       Single-stroke outline bass, geometric sans-serif wordmark.
       No frame, no flourish — designed to disappear into a clean header.
       Works equally on white or black backgrounds. -->

  <defs>
    <style>
      .bg     { fill:#FFFFFF; }
      .ink    { fill:#101010; }
      .stroke { fill:none; stroke:#101010; stroke-width:2; stroke-linejoin:round; stroke-linecap:round; }
      .stroke-thin { fill:none; stroke:#101010; stroke-width:1.2; stroke-linecap:round; }
      .sans   { font-family: 'Inter', 'Helvetica Neue', sans-serif; fill:#101010; }
    </style>
  </defs>

  <rect class="bg" width="600" height="360"/>

  <!-- ============ BASS ICON (outline only) ============ -->
  <g transform="translate(210,55)">
    <!-- Tail -->
    <path class="stroke" d="M 150 50 L 188 22 L 174 50 L 188 78 Z"/>
    <!-- Spiny dorsal -->
    <path class="stroke" d="M 56 28 L 64 8 L 72 24 L 82 12 L 92 24 L 102 14 L 112 24 L 122 16 L 132 28 Z"/>
    <!-- Pectoral fin -->
    <path class="stroke" d="M 38 56 L 26 80 L 52 66 Z"/>
    <!-- Pelvic fin -->
    <path class="stroke" d="M 64 72 L 74 92 L 86 74 Z"/>
    <!-- Anal fin -->
    <path class="stroke" d="M 112 76 L 122 94 L 132 76 Z"/>
    <!-- Body -->
    <path class="stroke" d="
      M 16 50
      C 16 28, 56 22, 96 26
      C 132 30, 156 38, 156 50
      C 156 62, 132 70, 96 74
      C 56 78, 16 72, 16 50
      Z"/>
    <!-- Mouth gape -->
    <path class="stroke" d="M 16 50 L 0 42 L 0 58 Z"/>
    <!-- Gill arc -->
    <path class="stroke-thin" d="M 38 32 Q 46 50 38 68"/>
    <!-- Eye -->
    <circle cx="32" cy="42" r="3" class="ink"/>
    <!-- Lateral line -->
    <path class="stroke-thin" d="M 50 50 Q 100 52 150 50" stroke-dasharray="3 3"/>
  </g>

  <!-- Wordmark — Inter, geometric, stacked -->
  <text class="sans" x="300" y="218" font-size="44" font-weight="700" text-anchor="middle" letter-spacing="-1">CRYSTAL BROOK</text>
  <text class="sans" x="300" y="252" font-size="14" font-weight="400" text-anchor="middle" letter-spacing="14">WALL MOUNTS</text>

  <!-- Tagline -->
  <text class="sans" x="300" y="295" font-size="11" font-weight="400" text-anchor="middle" letter-spacing="3" opacity="0.6">QUEENSLAND  ·  EST. 2024</text>
</svg>
