#:schema node_modules/wrangler/config-schema.json
# Crystal Brook Wall Mounts — storefront + catalogue API deploy
#
# Single Worker with two responsibilities:
#   1. /api/* — read/write the product catalogue from D1 (see src/index.js)
#   2. everything else — serve the static site (HTML/CSS/JS/images) from
#      Workers Static Assets, configured via [assets] below.
#
# The image-builder Worker lives separately in workers/image-builder/ — it
# was the first Worker added to the project and runs on its own deploy.

name = "crystalbrook"
main = "src/index.js"
compatibility_date = "2025-04-01"

[assets]
directory = "."
not_found_handling = "404-page"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "crystalbrook"
database_id = "5b43ae6e-915e-48a7-8193-7b3cf86a5623"

# R2 bucket for binary uploads too big for D1 (notably product videos —
# a 30-second 1080p MP4 is easily 10+MB, well past D1's 1MB row limit).
# Served back through the Worker at /uploads/<filename>.
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "crystalbrook-uploads"

[observability]
enabled = true

# ADMIN_PASSWORD is held as a Worker secret (set via `wrangler secret put
# ADMIN_PASSWORD`). The admin UI sends it via the X-Admin-Password header
# on every write request; src/index.js validates it before mutating D1.

# STRIPE_SECRET_KEY is also a Worker secret (set via `wrangler secret put
# STRIPE_SECRET_KEY`). Used server-side to create Checkout Sessions and
# look them up post-payment.
#
# STRIPE_WEBHOOK_SECRET (also a `wrangler secret put`) signs incoming
# webhook deliveries from Stripe to /api/stripe/webhook. Without it the
# webhook handler rejects everything with 401 — which is the right
# default (better to drop events than process forged ones). Grab the
# value from Stripe dashboard → Developers → Webhooks → click the
# endpoint → "Signing secret".
#
# The matching publishable key below is safe to commit and ship in the
# bundle — it's designed to live in frontend code where customers can see
# it. The pair authenticates the same Stripe account; only the secret
# half can move money.
# Custom domains — both apex and www resolve to this Worker.
# Requires crystalbrookwallmounts.com.au to be active as a zone in the
# same Cloudflare account before `wrangler deploy` will accept them.
[[custom_domains]]
hostname = "crystalbrookwallmounts.com.au"

[[custom_domains]]
hostname = "www.crystalbrookwallmounts.com.au"

[vars]
STRIPE_PUBLISHABLE_KEY = "pk_live_51TUg1f2L8xy2zrXzLQLbQyxAskrJAsC8PhPaOlrmeDEpkHjGVBk0HmzVgx2LSbu1Pk1QFfjpaXpbCMSNTULURCKq00XQSXGguY"
