<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Your custom Crystal Brook Wall Mounts quote — review and approve." />
<meta name="robots" content="noindex,nofollow" />
<title>Your quote · Crystal Brook Wall Mounts</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/styles.css?v=20260429-20" />
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png?v=20260429-20" />
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png?v=20260429-20" />
<style>
  /* === Quote review page (customer-facing) === */
  .page-quote { background: #f7f3ec; min-height: 100vh; }
  .quote-shell { max-width: 700px; margin: 0 auto; padding: 32px 24px 80px; }
  .quote-brand {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 0;
    margin-bottom: 24px;
  }
  .quote-brand img { width: 44px; height: 44px; border-radius: 6px; }
  .quote-brand-text { line-height: 1.2; }
  .quote-brand .b-name { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 600; color: var(--ink, #1c130a); }
  .quote-brand .b-sub { font-size: .72rem; letter-spacing: .15em; text-transform: uppercase; color: #7a6e5c; }

  .quote-card {
    background: #fff;
    border-radius: 8px;
    padding: 36px 32px;
    box-shadow: 0 4px 24px rgba(28, 19, 10, 0.06);
  }
  .quote-eyebrow { font-size: .68rem; letter-spacing: .18em; text-transform: uppercase; color: #7a6e5c; margin: 0 0 6px; }
  .quote-h1 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: clamp(1.7rem, 3vw, 2.2rem); margin: 0 0 16px; color: #1c130a; line-height: 1.15; }
  .quote-h1 em { font-style: italic; color: #a9864b; }
  .quote-meta { color: #7a6e5c; font-size: .9rem; margin: 0 0 28px; }

  .quote-mockup { margin: 0 0 28px; border-radius: 6px; overflow: hidden; background: #faf6ee; border: 1px solid rgba(0,0,0,0.06); }
  .quote-mockup img { display: block; width: 100%; max-height: 480px; object-fit: contain; }
  .quote-mockup-empty { padding: 60px 24px; text-align: center; color: #7a6e5c; font-style: italic; }

  .quote-meta-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 18px 28px;
    margin: 0 0 24px;
    padding: 18px 0;
    border-top: 1px solid #efe7d6;
    border-bottom: 1px solid #efe7d6;
  }
  .quote-meta-grid dt { font-size: .65rem; letter-spacing: .15em; text-transform: uppercase; color: #7a6e5c; margin: 0 0 4px; }
  .quote-meta-grid dd { margin: 0; font-size: 1rem; color: #1c130a; }

  .quote-message {
    margin: 0 0 28px; padding: 20px 22px;
    background: #faf6ee;
    border-left: 3px solid #a9864b;
    border-radius: 0 6px 6px 0;
    font-size: 1rem; line-height: 1.65; color: #1c130a;
    white-space: pre-wrap;
  }

  .quote-price-row {
    display: flex; align-items: baseline; justify-content: space-between; gap: 16px;
    padding: 18px 22px;
    background: linear-gradient(135deg, #faf6ee 0%, #f5ecd6 100%);
    border-radius: 6px;
    margin: 0 0 32px;
  }
  .quote-price-label { font-size: .72rem; letter-spacing: .18em; text-transform: uppercase; color: #7a6e5c; }
  .quote-price-value { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 2rem; color: #a9864b; line-height: 1; }

  .quote-actions { display: flex; gap: 12px; flex-wrap: wrap; }
  .qbtn {
    flex: 1; min-width: 160px;
    padding: 14px 22px; font-size: 1rem; font-weight: 500;
    border-radius: 6px; cursor: pointer; transition: background .2s, transform .15s;
    border: none;
    font-family: inherit;
  }
  .qbtn-approve { background: #a9864b; color: #1c130a; }
  .qbtn-approve:hover { background: #b8956a; transform: translateY(-1px); }
  .qbtn-changes { background: #fff; color: #1c130a; border: 1px solid rgba(0,0,0,0.18); }
  .qbtn-changes:hover { background: #faf6ee; border-color: rgba(0,0,0,0.3); }

  .quote-changes-form { margin-top: 22px; padding-top: 22px; border-top: 1px solid #efe7d6; }
  .quote-changes-form label { display: block; font-size: .68rem; letter-spacing: .15em; text-transform: uppercase; color: #7a6e5c; margin: 0 0 6px; }
  .quote-changes-form textarea {
    width: 100%; min-height: 110px;
    padding: 12px 14px;
    border: 1px solid rgba(0,0,0,0.18); border-radius: 6px;
    font: 400 .95rem/1.55 'Inter', sans-serif;
    color: #1c130a; background: #fff;
    resize: vertical;
  }
  .quote-changes-form textarea:focus { outline: none; border-color: #a9864b; box-shadow: 0 0 0 3px rgba(184, 134, 44, 0.15); }
  .quote-changes-actions { display: flex; gap: 10px; margin-top: 14px; }

  .quote-thanks { text-align: center; padding: 36px 24px; }
  .quote-thanks-mark { width: 72px; height: 72px; margin: 0 auto 18px; }
  .quote-thanks-mark svg { width: 100%; height: 100%; }
  .quote-thanks h2 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 1.7rem; margin: 0 0 12px; }
  .quote-thanks p { color: #7a6e5c; line-height: 1.6; margin: 0 0 20px; max-width: 460px; margin-left: auto; margin-right: auto; }

  .quote-err {
    color: #b14a3a; font-size: .9rem; margin: 14px 0 0;
    padding: 10px 14px; background: #fdf3f0; border-radius: 4px; border-left: 3px solid #b14a3a;
  }

  .quote-foot {
    text-align: center; padding: 32px 24px 0;
    color: #9c8e76; font-size: .82rem;
  }

  .quote-skeleton { padding: 60px 24px; text-align: center; color: #9c8e76; font-style: italic; }

  @media (max-width: 540px) {
    .quote-card { padding: 24px 18px; }
    .quote-actions { flex-direction: column; }
    .qbtn { min-width: 0; width: 100%; }
  }
</style>
</head>
<body class="page-quote">

<div class="quote-shell">
  <div class="quote-brand">
    <img src="assets/logos/logo-mark-96.png?v=20260429-20" alt="Crystal Brook" />
    <div class="quote-brand-text">
      <div class="b-name">Crystal Brook</div>
      <div class="b-sub">Wall Mounts</div>
    </div>
  </div>

  <div class="quote-card" id="quoteCard">
    <div class="quote-skeleton" id="quoteSkeleton">Loading your quote…</div>
    <div id="quoteContent" hidden></div>
    <div id="quoteThanks" class="quote-thanks" hidden></div>
    <div id="quoteError" class="quote-err" hidden></div>
  </div>

  <div class="quote-foot">
    Crystal Brook Wall Mounts · Gordonvale, FNQ<br/>
    Questions? Reply to the email Max sent you, or ring <a href="tel:+61740561887">(07) 4056 1887</a>.
  </div>
</div>

<script>
(() => {
  const params = new URLSearchParams(location.search);
  const id    = params.get('id') || '';
  const token = params.get('token') || '';
  const skel  = document.getElementById('quoteSkeleton');
  const card  = document.getElementById('quoteCard');
  const content = document.getElementById('quoteContent');
  const thanks  = document.getElementById('quoteThanks');
  const errEl = document.getElementById('quoteError');

  function showError(msg) {
    skel.hidden = true;
    content.hidden = true;
    thanks.hidden = true;
    errEl.textContent = msg;
    errEl.hidden = false;
  }

  if (!id || !token) { showError('This quote link is missing some details. Drop Max a message and he\'ll resend it.'); return; }

  fetch('/api/quote?id=' + encodeURIComponent(id) + '&token=' + encodeURIComponent(token))
    .then(r => r.ok ? r.json() : Promise.reject(new Error('not found')))
    .then(data => render(data.quote))
    .catch(err => showError('We couldn\'t find that quote. The link might be expired — drop Max a message and he\'ll send a fresh one.'));

  function render(q) {
    skel.hidden = true;
    if (q.response === 'approved') {
      renderThanks('approved', q);
      return;
    }
    if (q.response === 'changes_requested') {
      renderThanks('changes_requested', q);
      return;
    }

    const firstName = (q.name || 'there').split(' ')[0];
    const mockup = q.quoteImageUrl
      ? '<div class="quote-mockup"><img src="' + q.quoteImageUrl + '" alt="Mockup of your custom piece"/></div>'
      : '<div class="quote-mockup"><div class="quote-mockup-empty">Max will send a mockup separately if you\'d like one — just reply to his email.</div></div>';
    const sizeLabel = ({small:'Small (≤ 50 cm)', medium:'Medium (50–80 cm)', large:'Large (80–100 cm)', xl:'XL (100 cm +)'})[q.size] || (q.size || '');

    content.innerHTML = `
      <p class="quote-eyebrow">Your custom quote · ${escapeHtml(q.id)}</p>
      <h1 class="quote-h1">A piece for you, <em>${escapeHtml(firstName)}</em>.</h1>
      <p class="quote-meta">Max has put this together for the piece you described. Have a look, then approve below or ask for changes.</p>

      ${mockup}

      <dl class="quote-meta-grid">
        <div><dt>Subject</dt><dd>${escapeHtml(q.subject || '—')}</dd></div>
        ${q.category ? '<div><dt>Category</dt><dd>' + escapeHtml(prettyCat(q.category)) + '</dd></div>' : ''}
        ${sizeLabel ? '<div><dt>Approx. size</dt><dd>' + escapeHtml(sizeLabel) + '</dd></div>' : ''}
      </dl>

      ${q.quoteMessage ? '<p class="quote-message">' + escapeHtml(q.quoteMessage) + '</p>' : ''}

      <div class="quote-price-row">
        <span class="quote-price-label">Total quoted</span>
        <span class="quote-price-value">$${(q.quotePrice || 0).toLocaleString()}</span>
      </div>

      <div class="quote-actions">
        <button class="qbtn qbtn-approve" id="qApprove" type="button">Yes — go ahead and make it</button>
        <button class="qbtn qbtn-changes" id="qChanges" type="button">I'd like to discuss changes</button>
      </div>

      <div class="quote-changes-form" id="qChangesForm" hidden>
        <label for="qMsg">Tell Max what you'd like adjusted</label>
        <textarea id="qMsg" placeholder="A different pose, a smaller size, an extra detail — whatever you have in mind."></textarea>
        <div class="quote-changes-actions">
          <button class="qbtn qbtn-approve" id="qSendChanges" type="button">Send to Max</button>
          <button class="qbtn qbtn-changes" id="qCancelChanges" type="button">Cancel</button>
        </div>
      </div>
    `;
    content.hidden = false;

    document.getElementById('qApprove').addEventListener('click', () => respond('approved', ''));
    document.getElementById('qChanges').addEventListener('click', () => {
      document.getElementById('qChangesForm').hidden = false;
      document.getElementById('qApprove').disabled = true;
      document.getElementById('qChanges').disabled = true;
      document.getElementById('qMsg').focus();
    });
    document.getElementById('qCancelChanges').addEventListener('click', () => {
      document.getElementById('qChangesForm').hidden = true;
      document.getElementById('qApprove').disabled = false;
      document.getElementById('qChanges').disabled = false;
    });
    document.getElementById('qSendChanges').addEventListener('click', () => {
      const msg = (document.getElementById('qMsg').value || '').trim();
      if (!msg) { document.getElementById('qMsg').focus(); return; }
      respond('changes_requested', msg);
    });
  }

  async function respond(response, message) {
    errEl.hidden = true;
    const buttons = card.querySelectorAll('button');
    buttons.forEach(b => b.disabled = true);
    try {
      const res = await fetch('/api/quote/respond?id=' + encodeURIComponent(id) + '&token=' + encodeURIComponent(token), {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ response, message }),
      });
      if (!res.ok) throw new Error('save failed');
      content.hidden = true;
      renderThanks(response, { responseMessage: message });
    } catch (err) {
      buttons.forEach(b => b.disabled = false);
      errEl.textContent = 'Couldn\'t send your response — try again in a moment.';
      errEl.hidden = false;
    }
  }

  function renderThanks(kind, q) {
    if (kind === 'approved') {
      thanks.innerHTML = `
        <div class="quote-thanks-mark">
          <svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="30" fill="none" stroke="#3a8a4f" stroke-width="3"/><path d="M19 33 L28 42 L46 22" fill="none" stroke="#3a8a4f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <h2>Approved — Max is on it.</h2>
        <p>You'll get an email when production starts, and another when your piece ships. Lead time is 4–6 weeks from now.</p>
        <p style="font-size:.82rem;color:#9c8e76;">If anything changes on your end, just reply to the email Max sent you.</p>`;
    } else {
      thanks.innerHTML = `
        <div class="quote-thanks-mark">
          <svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="30" fill="none" stroke="#a9864b" stroke-width="3"/><path d="M22 32 L42 32" fill="none" stroke="#a9864b" stroke-width="4" stroke-linecap="round"/></svg>
        </div>
        <h2>Sent — Max will be in touch.</h2>
        <p>Your note's gone to Max. He'll have a look and email you with an updated quote.</p>
        ${q.responseMessage ? '<div style="margin:24px auto;max-width:460px;text-align:left;background:#faf6ee;border-left:3px solid #a9864b;padding:14px 18px;border-radius:0 6px 6px 0;color:#1c130a;font-size:.95rem;line-height:1.55;white-space:pre-wrap;"><strong>What you sent:</strong>\n' + escapeHtml(q.responseMessage) + '</div>' : ''}`;
    }
    thanks.hidden = false;
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function prettyCat(c) {
    return ({saltwater:'Saltwater fish', freshwater:'Freshwater fish', cars:'Cars', animals:'Animals', birds:'Birds', other:'Other'})[c] || c;
  }
})();
</script>

</body>
</html>
